<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>EIS Wiki Atlas</title>
  <link rel="stylesheet" href="/assets/styles.css">
  <link rel="stylesheet" href="/assets/katex/katex.min.css">
</head>
<body>
<header>
  <button id="brand">Knowledge Atlas <b>Wiki</b></button>
  <input id="search" placeholder="개념, 수식, 방법, 동의어 검색">
  <span id="count"></span>
  <button id="theme" title="테마 전환">◐</button>
</header>
<div class="layout" id="layout">
  <aside id="sidebar">
    <div class="side-tabs">
      <button data-tab="domains" class="active">영역</button>
      <button data-tab="notes">노트</button>
    </div>
    <div id="sideContent"></div>
  </aside>
  <div class="splitter" id="splitLeft" role="separator" aria-orientation="vertical" tabindex="0"></div>
  <main id="main"></main>
  <div class="splitter" id="splitRight" role="separator" aria-orientation="vertical" tabindex="0"></div>
  <section id="graphPanel">
    <div class="graph-head">
      <div>
        <h3 id="graphTitle">전체 연결 지도</h3>
        <small id="graphSubtitle">색상은 지식 그룹, 원 크기는 현재 그래프 연결도를 나타냅니다.</small>
      </div>
      <div class="graph-actions">
        <button id="fit" title="그래프 맞춤">◎</button>
        <button id="resetFocus" title="선택 중심 배치 해제">↺</button>
        <button id="pause" title="배치 정지/재개">Ⅱ</button>
        <button id="graphSettingsBtn" title="그래프 설정">⚙</button>
      </div>
    </div>
    <div class="graph-quick-controls" aria-label="그래프 빠른 설정">
      <div class="view-switch" role="group" aria-label="그래프 보기 선택">
        <button id="viewOverview" type="button" class="active" aria-pressed="true">전체 연결 지도</button>
        <button id="viewFocus" type="button" aria-pressed="false">포커스 그래프</button>
        <select id="viewMode" hidden aria-hidden="true"><option value="overview" selected>전체 연결 지도</option><option value="focus">포커스 그래프</option></select>
      </div>
      <label id="depthQuick" class="depth-quick">연결 깊이
        <select id="depth" aria-label="포커스 그래프 연결 깊이"><option>1</option><option selected>2</option><option>3</option></select>
      </label>
    </div>
    <div id="graphStage">
      <div id="sigmaContainer" aria-label="전체 지식 그래프"></div>
      <canvas id="graphCanvas" aria-label="대화형 포커스 지식 그래프"></canvas>
      <div id="tooltip" hidden></div>
      <div id="graphSettings" hidden>
        <div class="settings-title">그래프 표현</div>
        <label>전체 지도 배치
          <select id="layoutVariant"><option value="linlog" selected>ForceAtlas2 LinLog</option><option value="standard">ForceAtlas2 기본</option></select>
        </label>
        <label>색상 기준
          <select id="colorMode">
            <option value="community" selected>자동 커뮤니티</option>
            <option value="macro">대영역</option>
            <option value="domain">세부 영역</option>
            <option value="type">노트 유형</option>
            <option value="review">검토 상태</option>
          </select>
        </label>
        <label>라벨
          <select id="labelMode">
            <option value="auto" selected>자동</option>
            <option value="all">모두</option>
            <option value="off">숨김</option>
          </select>
        </label>
        <label>노드 크기 기준
          <select id="sizeMode">
            <option value="degree" selected>현재 그래프 연결도</option>
            <option value="uniform">균일 크기(중심 제외)</option>
          </select>
        </label>
        <label class="check"><input type="checkbox" id="arrows"> 관계 방향 화살표</label>
        <label class="check"><input type="checkbox" id="showMaps"> MOC·지도 노드 표시(포커스)</label>
        <label>전체 크기 <input type="range" id="nodeScale" min="70" max="180" value="112"></label>
        <label>노드 간격 <input type="range" id="distance" min="65" max="165" value="110"></label>
        <label>반발력 <input type="range" id="repel" min="25" max="180" value="92"></label>
        <button id="restart">재배치</button>
        <button id="defaults">기본값 복원</button>
      </div>
    </div>
    <div class="legend-block">
      <div class="legend-title">노드 색상 <small>클릭하여 숨김/표시</small></div>
      <div id="colorLegend" class="graph-legend"></div>
    </div>
    <div class="legend-block">
      <div class="legend-title">노드 크기·강조 <small>비활성 노드도 원래 색조를 유지하며 채도와 밝기만 낮춤</small></div>
      <div id="typeLegend" class="graph-legend"></div>
    </div>
    <div class="legend-block">
      <div class="legend-title">관계선 <small>색·선형은 관계 의미</small></div>
      <div id="relationLegend" class="graph-legend relation-legend"></div>
    </div>
    <div id="graphStats"></div>
    <div id="edgeList"></div>
  </section>
</div>
<script src="/data/wiki-data.js"></script>
<script src="/assets/app.js"></script>
</body>
</html>
